<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Log in to AURA</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="public-page login-public-page">
    <header class="public-nav">
      <a class="public-wordmark" href="./index.html" aria-label="AURA home">
        <span>A</span>
        <strong>AURA</strong>
      </a>
      <nav class="public-nav-links" aria-label="Website navigation">
        <a href="./index.html#product">Product</a>
        <a href="./index.html#recognition">Recognition</a>
        <a href="./index.html#rewards">Rewards</a>
        <a href="./pricing.html">Pricing</a>
        <a href="./contact.html">Contact</a>
      </nav>
      <div class="public-nav-actions">
        <a class="public-login" href="./login.html" aria-current="page">Log in</a>
        <a class="public-cta" href="./trial.html">Start Trial</a>
      </div>
    </header>

    <main class="login-public">
      <section class="login-panel" aria-labelledby="login-title">
        <div class="public-orb-stage compact" aria-hidden="true">
          <div class="public-orbit"></div>
          <div class="public-orb"><span>AURA</span></div>
        </div>
        <p class="public-badge">Demo login</p>
        <h1 id="login-title">Welcome to AURA.</h1>
        <p>No credentials are required yet. Enter the local Hilton Glasgow dashboard demo.</p>
        <a class="public-primary js-demo-link" href="./dashboard.html">Enter Dashboard</a>
        <small>Demo mode. No account required.</small>
      </section>
    </main>

    <script src="./public-site.js"></script>
  </body>
</html>
