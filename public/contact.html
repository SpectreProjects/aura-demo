<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact AURA</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="public-page">
    <header class="public-nav">
      <a class="public-wordmark" href="./index.html" aria-label="AURA home"><span>A</span><strong>AURA</strong></a>
      <nav class="public-nav-links" aria-label="Website navigation">
        <a href="./index.html#product">Product</a>
        <a href="./index.html#recognition">Recognition</a>
        <a href="./index.html#rewards">Rewards</a>
        <a href="./pricing.html">Pricing</a>
        <a href="./contact.html" aria-current="page">Contact</a>
      </nav>
      <div class="public-nav-actions">
        <a class="public-login" href="./login.html">Log in</a>
        <a class="public-cta" href="./trial.html">Start Trial</a>
      </div>
    </header>

    <main class="public-main page-main split-public-page">
      <section class="page-hero left">
        <p class="public-badge">Contact</p>
        <h1>Talk to us about review operations.</h1>
        <p>Use this local demo form to model a manager enquiry. Nothing is sent to a backend.</p>
        <div class="contact-notes">
          <span>Hospitality teams</span>
          <span>Multi-location operators</span>
          <span>Staff recognition programmes</span>
        </div>
      </section>

      <section class="premium-form-card" aria-labelledby="contact-title">
        <h2 id="contact-title">Send a message</h2>
        <form class="premium-form" data-local-form data-success-message="Thanks. Your message has been received in demo mode.">
          <label><span>Name</span><input name="name" type="text" required></label>
          <label><span>Business name</span><input name="business" type="text" required></label>
          <label><span>Email</span><input name="email" type="email" required></label>
          <label><span>Message</span><textarea name="message" rows="5" required></textarea></label>
          <button class="public-primary" type="submit">Send Message</button>
          <p class="form-message" data-form-message aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="./public-site.js"></script>
  </body>
</html>
